<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#7B61FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7B61FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="240" fill="url(#bgGrad)"/>

  <g opacity="0.45">
    <circle cx="80"   cy="50"  r="2"   fill="#00D9FF"/>
    <circle cx="180"  cy="90"  r="1.4" fill="#7B61FF"/>
    <circle cx="40"   cy="130" r="1"   fill="#00D9FF"/>
    <circle cx="240"  cy="40"  r="1.6" fill="#7B61FF"/>
    <circle cx="140"  cy="160" r="1.2" fill="#00D9FF"/>
    <circle cx="1120" cy="40"  r="2"   fill="#7B61FF"/>
    <circle cx="1040" cy="130" r="1.4" fill="#00D9FF"/>
    <circle cx="1160" cy="90"  r="1"   fill="#7B61FF"/>
    <circle cx="980"  cy="60"  r="1.6" fill="#00D9FF"/>
    <circle cx="1080" cy="170" r="1.2" fill="#7B61FF"/>
  </g>

  <path fill="url(#waveGrad)">
    <animate attributeName="d" dur="7s" repeatCount="indefinite"
      values="
        M 0 200 Q 200 170 400 200 T 800 200 T 1200 200 L 1200 240 L 0 240 Z;
        M 0 200 Q 200 230 400 200 T 800 200 T 1200 200 L 1200 240 L 0 240 Z;
        M 0 200 Q 200 170 400 200 T 800 200 T 1200 200 L 1200 240 L 0 240 Z"/>
  </path>

  <path fill="#7B61FF" opacity="0.25">
    <animate attributeName="d" dur="9s" repeatCount="indefinite"
      values="
        M 0 215 Q 300 195 600 215 T 1200 215 L 1200 240 L 0 240 Z;
        M 0 215 Q 300 235 600 215 T 1200 215 L 1200 240 L 0 240 Z;
        M 0 215 Q 300 195 600 215 T 1200 215 L 1200 240 L 0 240 Z"/>
  </path>

  <text x="600" y="115" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="2">
    Ryan Matheus
  </text>

  <line x1="500" y1="138" x2="700" y2="138" stroke="url(#accentLine)" stroke-width="2"/>

  <text x="600" y="170" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#a0a8c0" text-anchor="middle" letter-spacing="6">
    FULLSTACK DEVELOPER &amp; TECH LEAD
  </text>
</svg>
